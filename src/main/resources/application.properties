# ============ DATABASE CONFIGURATION ============
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mbankingdbspring}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ============ JPA/HIBERNATE ============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}

# ============ THYMELEAF ============
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# ============ SERVER ============
server.port=8080

# ============ LOGGING ============
logging.level.com.mbank=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=INFO
